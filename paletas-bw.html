<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KUERRE — B&W + Accent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:'Inter',sans-serif; padding:40px 20px; }
h1 { color:#fff; text-align:center; font-size:12px; letter-spacing:.35em; text-transform:uppercase; font-weight:300; margin-bottom:6px; }
.sub { color:#333; text-align:center; font-size:11px; margin-bottom:48px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; max-width:1200px; margin:0 auto; }
.card { border-radius:14px; overflow:hidden; border:1px solid #1a1a1a; cursor:pointer; transition:transform .15s; }
.card:hover { transform:translateY(-3px); }
.card.sel { outline:2px solid #fff; outline-offset:2px; }
.lbl { background:#141414; padding:10px 14px; display:flex; align-items:center; gap:8px; }
.num { width:20px; height:20px; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
.nm { color:#ddd; font-size:12px; }
.ds { color:#333; font-size:10px; margin-left:auto; text-align:right; }

/* MOCK UI */
.mock { height:210px; position:relative; overflow:hidden; display:flex; flex-direction:column; }
.mock-nav { height:38px; display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; position:relative; z-index:2; }
.mock-logo-k { width:22px; height:22px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; flex-shrink:0; }
.mock-brand { font-size:11px; font-weight:500; letter-spacing:.12em; }
.mock-links { display:flex; gap:14px; margin-left:auto; }
.mock-links span { font-size:9px; opacity:.4; }
.mock-cta-nav { padding:5px 12px; border-radius:4px; font-size:8px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
.mock-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:16px; position:relative; z-index:2; }
.mock-eyebrow { font-size:8px; letter-spacing:.4em; text-transform:uppercase; }
.mock-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-style:italic; font-weight:300; text-align:center; line-height:1.15; }
.mock-sub { font-size:8px; opacity:.4; letter-spacing:.06em; text-align:center; }
.mock-btns { display:flex; gap:8px; margin-top:4px; }
.mock-btn { padding:6px 16px; border-radius:5px; font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
.mock-divider { height:1px; width:100%; }

/* SWATCHES */
.sw-row { background:#141414; padding:10px 14px; display:flex; gap:8px; }
.sw { display:flex; flex-direction:column; align-items:center; gap:3px; }
.dot { width:26px; height:26px; border-radius:6px; }
.hx { font-size:8px; color:#333; font-family:monospace; }

.chosen { text-align:center; color:#333; font-size:12px; margin-top:40px; padding-bottom:40px; }
.chosen b { color:#fff; }
</style>
</head>
<body>
<h1>KUERRE — Blanco y Negro + Acento</h1>
<p class="sub">Predominio B&W · el color solo en detalles</p>
<div class="grid" id="grid"></div>
<p class="chosen" id="chosen">Ninguna seleccionada</p>

<script>
const V = [
  {
    num:1, nm:'Salmón', ds:'Cálido, suave',
    accent:'#fb7185', accentDim:'rgba(251,113,133,.15)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#fb7185',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(251,113,133,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#fb7185']
  },
  {
    num:2, nm:'Ámbar', ds:'Elegante, premium',
    accent:'#f59e0b', accentDim:'rgba(245,158,11,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#f59e0b',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(245,158,11,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#f59e0b']
  },
  {
    num:3, nm:'Teal', ds:'Fresco, digital',
    accent:'#2dd4bf', accentDim:'rgba(45,212,191,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#2dd4bf',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(45,212,191,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#2dd4bf']
  },
  {
    num:4, nm:'Violeta', ds:'Sofisticado, nocturno',
    accent:'#a855f7', accentDim:'rgba(168,85,247,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#a855f7',color:'#fff'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(168,85,247,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#a855f7']
  },
  {
    num:5, nm:'Lima', ds:'Audaz, joven, tech',
    accent:'#a3e635', accentDim:'rgba(163,230,53,.1)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#a3e635',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(163,230,53,.12)',
    swatches:['#080808','#ffffff','#1a1a1a','#a3e635']
  },
  {
    num:6, nm:'Naranja', ds:'Energía, calidez',
    accent:'#f97316', accentDim:'rgba(249,115,22,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#f97316',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(249,115,22,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#f97316']
  },
  {
    num:7, nm:'Azul Eléctrico', ds:'Confianza, tech',
    accent:'#3b82f6', accentDim:'rgba(59,130,246,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#3b82f6',color:'#fff'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(59,130,246,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#3b82f6']
  },
  {
    num:8, nm:'Fucsia', ds:'Eventos, fiestas, bold',
    accent:'#e879f9', accentDim:'rgba(232,121,249,.1)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#e879f9',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(232,121,249,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#e879f9']
  },
  {
    num:9, nm:'Esmeralda', ds:'Natural, elegante',
    accent:'#10b981', accentDim:'rgba(16,185,129,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#10b981',color:'#000'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(16,185,129,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#10b981']
  },
  {
    num:10, nm:'Rojo Carmín', ds:'Pasión, impacto, boda',
    accent:'#dc2626', accentDim:'rgba(220,38,38,.12)',
    bg:'#080808', nav:'rgba(8,8,8,.95)', text:'#fff', textDim:'rgba(255,255,255,.38)',
    btnPrimary:{bg:'#dc2626',color:'#fff'}, btnSecondary:{bg:'transparent',border:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.5)'},
    divider:'rgba(220,38,38,.15)',
    swatches:['#080808','#ffffff','#1a1a1a','#dc2626']
  }
];

const grid = document.getElementById('grid');
const chosen = document.getElementById('chosen');

V.forEach(v=>{
  const card = document.createElement('div');
  card.className='card';
  card.onclick=()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
    card.classList.add('sel');
    chosen.innerHTML=`Seleccionaste: <b>${v.num} — ${v.nm}</b>`;
  };

  card.innerHTML=`
    <div class="lbl">
      <div class="num" style="background:${v.accent}22;color:${v.accent}">${v.num}</div>
      <span class="nm">${v.nm}</span>
      <span class="ds">${v.ds}</span>
    </div>

    <div class="mock" style="background:${v.bg}">

      <div class="mock-nav" style="background:${v.nav};border-bottom:1px solid rgba(255,255,255,.04)">
        <div class="mock-logo-k" style="background:${v.accent};color:#000">K</div>
        <span class="mock-brand" style="color:${v.text}">KUERRE</span>
        <div class="mock-links">
          <span>QR</span><span>Premiere</span><span>Invitaciones</span>
        </div>
        <div class="mock-cta-nav" style="border:1px solid ${v.accent};color:${v.accent}">Contactar</div>
      </div>

      <div class="mock-body">
        <span class="mock-eyebrow" style="color:${v.accent}">&mdash; servicios digitales &mdash;</span>
        <div class="mock-title" style="color:${v.text}">Experiencias que<br>perduran</div>
        <div class="mock-sub" style="color:${v.textDim}">QR · PREMIERE · INVITACIONES DIGITALES</div>
        <div class="mock-btns">
          <div class="mock-btn" style="background:${v.btnPrimary.bg};color:${v.btnPrimary.color}">Ver servicios</div>
          <div class="mock-btn" style="border:1px solid ${v.btnSecondary.border};color:${v.btnSecondary.color}">Contactar</div>
        </div>
      </div>

      <div class="mock-divider" style="background:${v.divider}"></div>
    </div>

    <div class="sw-row">
      ${v.swatches.map((s,i)=>`
        <div class="sw">
          <div class="dot" style="background:${s};${s==='#ffffff'?'border:1px solid #333':''}"></div>
          <div class="hx">${s}</div>
        </div>`).join('')}
      <div class="sw" style="margin-left:auto">
        <div class="dot" style="background:${v.accent}22;border:1px solid ${v.accent}44;display:flex;align-items:center;justify-content:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${v.accent}"></div>
        </div>
        <div class="hx" style="color:${v.accent}">${v.accent}</div>
      </div>
    </div>`;

  grid.appendChild(card);
});
</script>
</body>
</html>
