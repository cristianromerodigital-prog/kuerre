<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KUERRE — Negro + Blanco + Dorado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080808; font-family:'Inter',sans-serif; padding:40px 20px; }
h1 { color:#fff; text-align:center; font-size:12px; letter-spacing:.35em; text-transform:uppercase; font-weight:300; margin-bottom:6px; }
.sub { color:#2e2e2e; text-align:center; font-size:11px; margin-bottom:48px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; max-width:1200px; margin:0 auto; }
.card { border-radius:14px; overflow:hidden; border:1px solid #181818; cursor:pointer; transition:transform .15s; }
.card:hover { transform:translateY(-3px); }
.card.sel { outline:2px solid #d4a843; outline-offset:2px; }
.lbl { background:#111; padding:10px 14px; display:flex; align-items:center; gap:8px; }
.num { width:20px; height:20px; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
.nm { color:#ddd; font-size:12px; }
.ds { color:#333; font-size:10px; margin-left:auto; text-align:right; }
.mock { height:220px; position:relative; overflow:hidden; display:flex; flex-direction:column; }
.mnav { height:38px; display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; position:relative; z-index:2; }
.mlogo-k { width:22px; height:22px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; }
.mbrand { font-size:11px; font-weight:500; letter-spacing:.12em; }
.mlinks { display:flex; gap:14px; margin-left:auto; }
.mlinks span { font-size:9px; opacity:.35; }
.mcta { padding:5px 12px; border-radius:4px; font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
.mbody { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:16px; position:relative; z-index:2; }
.meye { font-size:8px; letter-spacing:.4em; text-transform:uppercase; }
.mtitle { font-family:'Cormorant Garamond',serif; font-size:20px; font-style:italic; font-weight:300; text-align:center; line-height:1.15; }
.msub { font-size:8px; opacity:.35; letter-spacing:.06em; }
.mbtns { display:flex; gap:8px; margin-top:4px; }
.mbtn { padding:6px 16px; border-radius:5px; font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
.mglow { position:absolute; inset:0; pointer-events:none; }
.sw-row { background:#111; padding:10px 14px; display:flex; gap:8px; align-items:center; }
.sw { display:flex; flex-direction:column; align-items:center; gap:3px; }
.dot { width:26px; height:26px; border-radius:6px; }
.hx { font-size:8px; color:#333; font-family:monospace; }
.nl { font-size:7px; color:#2a2a2a; }
.chosen { text-align:center; color:#333; font-size:12px; margin-top:40px; padding-bottom:40px; }
.chosen b { color:#d4a843; }
</style>
</head>
<body>
<h1>KUERRE — Negro · Blanco · Dorado</h1>
<p class="sub">10 tonos de dorado sobre base B&W</p>
<div class="grid" id="grid"></div>
<p class="chosen" id="chosen">Ninguna seleccionada</p>

<script>
const V = [
  {
    num:1, nm:'Oro Clásico', ds:'Cálido, atemporalidal',
    bg:'#080806', gold:'#d4a843', goldL:'#f0c96a', goldD:'#9a7520',
    navBg:'rgba(8,8,6,.96)', textColor:'#ffffff'
  },
  {
    num:2, nm:'Oro Pálido', ds:'Delicado, champagne',
    bg:'#090908', gold:'#e8c97e', goldL:'#f5e0b0', goldD:'#c4a24a',
    navBg:'rgba(9,9,8,.96)', textColor:'#ffffff'
  },
  {
    num:3, nm:'Ámbar Brillante', ds:'Potente, moderno',
    bg:'#070707', gold:'#f59e0b', goldL:'#fbbf24', goldD:'#d97706',
    navBg:'rgba(7,7,7,.96)', textColor:'#ffffff'
  },
  {
    num:4, nm:'Bronce Oscuro', ds:'Antiguo, exclusivo',
    bg:'#080806', gold:'#b8860b', goldL:'#d4a020', goldD:'#7a5900',
    navBg:'rgba(8,8,6,.96)', textColor:'#ffffff'
  },
  {
    num:5, nm:'Dorado Frío', ds:'Moderno, plateado-oro',
    bg:'#080808', gold:'#c8b96a', goldL:'#e0d090', goldD:'#a09040',
    navBg:'rgba(8,8,8,.96)', textColor:'#ffffff'
  },
  {
    num:6, nm:'Champagne + Negro', ds:'Ultra premium, boda',
    bg:'#060605', gold:'#d4b896', goldL:'#ecdcc0', goldD:'#b09060',
    navBg:'rgba(6,6,5,.96)', textColor:'#ffffff'
  },
  {
    num:7, nm:'Dorado sobre Blanco', ds:'Limpio, lujoso, diurno',
    bg:'#f8f6f0', gold:'#b8860b', goldL:'#d4a020', goldD:'#7a5900',
    navBg:'rgba(248,246,240,.96)', textColor:'#111111'
  },
  {
    num:8, nm:'Oro Neón', ds:'Joven, vibrante',
    bg:'#070707', gold:'#fbbf24', goldL:'#fde68a', goldD:'#d97706',
    navBg:'rgba(7,7,7,.96)', textColor:'#ffffff'
  },
  {
    num:9, nm:'Negro Frío + Oro', ds:'Stark, editorial',
    bg:'#030303', gold:'#d4a843', goldL:'#f0c96a', goldD:'#9a7520',
    navBg:'rgba(3,3,3,.98)', textColor:'#ffffff'
  },
  {
    num:10, nm:'Plata + Oro', ds:'Dos metales, sofisticado',
    bg:'#080808', gold:'#d4a843', goldL:'#f0c96a', goldD:'#c0c0c0',
    navBg:'rgba(8,8,8,.96)', textColor:'#ffffff', silver:true
  }
];

const grid = document.getElementById('grid');
const chosen = document.getElementById('chosen');

const isLight = bg => {
  const r=parseInt(bg.slice(1,3),16), g=parseInt(bg.slice(3,5),16), b=parseInt(bg.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128;
};

V.forEach(v=>{
  const light = isLight(v.bg);
  const textDim = light ? 'rgba(0,0,0,.35)' : 'rgba(255,255,255,.32)';
  const borderDim = light ? 'rgba(0,0,0,.1)' : 'rgba(255,255,255,.06)';
  const linkColor = light ? 'rgba(0,0,0,.5)' : 'rgba(255,255,255,.38)';
  const btn2color = light ? 'rgba(0,0,0,.5)' : 'rgba(255,255,255,.5)';
  const btn2border = light ? 'rgba(0,0,0,.15)' : 'rgba(255,255,255,.12)';

  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = ()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
    card.classList.add('sel');
    chosen.innerHTML = `Seleccionaste: <b>${v.num} — ${v.nm}</b>`;
  };

  // accent for second btn/detail — silver uses goldD as silver
  const detail = v.silver ? v.goldD : v.gold;

  card.innerHTML = `
    <div class="lbl">
      <div class="num" style="background:${v.gold}22;color:${v.gold}">${v.num}</div>
      <span class="nm">${v.nm}</span>
      <span class="ds">${v.ds}</span>
    </div>

    <div class="mock" style="background:${v.bg}">
      <div class="mglow" style="background:
        radial-gradient(ellipse 60% 50% at 20% 20%, ${v.gold.replace('#','rgba(').replace(/([0-9a-f]{2})/gi,m=>parseInt(m,16)+',').replace(/,$/, '')},.12) 0%, transparent 60%),
        radial-gradient(ellipse 45% 40% at 80% 80%, ${v.goldL.replace('#','rgba(').replace(/([0-9a-f]{2})/gi,m=>parseInt(m,16)+',').replace(/,$/, '')},.06) 0%, transparent 55%)">
      </div>

      <div class="mnav" style="background:${v.navBg};border-bottom:1px solid ${borderDim}">
        <div class="mlogo-k" style="background:${v.gold};color:#000">K</div>
        <span class="mbrand" style="color:${v.textColor}">KUERRE</span>
        <div class="mlinks">
          <span style="color:${linkColor}">QR</span>
          <span style="color:${linkColor}">Premiere</span>
          <span style="color:${linkColor}">Invitaciones</span>
        </div>
        <div class="mcta" style="border:1px solid ${v.gold};color:${v.gold}">Contactar</div>
      </div>

      <div class="mbody">
        <span class="meye" style="color:${v.gold}">&mdash; servicios digitales &mdash;</span>
        <div class="mtitle" style="color:${v.textColor}">Experiencias que<br>perduran</div>
        <div class="msub" style="color:${textDim}">QR · PREMIERE · INVITACIONES DIGITALES</div>
        <div class="mbtns">
          <div class="mbtn" style="background:${v.gold};color:#000">Ver servicios</div>
          <div class="mbtn" style="border:1px solid ${btn2border};color:${btn2color}">Saber más</div>
        </div>
      </div>
    </div>

    <div class="sw-row">
      <div class="sw">
        <div class="dot" style="background:${v.bg};border:1px solid #222"></div>
        <div class="hx">${v.bg}</div><div class="nl">Fondo</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${v.textColor};${v.textColor==='#ffffff'?'border:1px solid #333':''}"></div>
        <div class="hx">${v.textColor}</div><div class="nl">Texto</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${v.gold}"></div>
        <div class="hx">${v.gold}</div><div class="nl">Oro</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${v.goldL}"></div>
        <div class="hx">${v.goldL}</div><div class="nl">Oro claro</div>
      </div>
      ${v.silver?`<div class="sw"><div class="dot" style="background:${v.goldD}"></div><div class="hx">${v.goldD}</div><div class="nl">Plata</div></div>`:''}
    </div>`;

  grid.appendChild(card);
});
</script>
</body>
</html>
