<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KUERRE — Dorado Metálico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ddd; font-family:'Inter',sans-serif; padding:40px 20px; }
h1 { color:#111; text-align:center; font-size:12px; letter-spacing:.35em; text-transform:uppercase; font-weight:300; margin-bottom:6px; }
.sub { color:#999; text-align:center; font-size:11px; margin-bottom:48px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:28px; max-width:1100px; margin:0 auto; }

.card { border-radius:18px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.12); cursor:pointer; transition:transform .15s; border:1px solid rgba(0,0,0,.07); }
.card:hover { transform:translateY(-4px); }
.card.sel { outline:3px solid #111; outline-offset:2px; }

.lbl { background:#fff; padding:11px 15px; display:flex; align-items:center; gap:8px; border-bottom:1px solid rgba(0,0,0,.06); }
.num { width:22px; height:22px; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; }
.nm  { color:#111; font-size:12px; font-weight:500; }
.ds  { color:#bbb; font-size:10px; margin-left:auto; }

/* MOCK */
.mock { height:240px; position:relative; overflow:hidden; display:flex; flex-direction:column; background:#fff; }

/* glow background */
.glow { position:absolute; inset:0; pointer-events:none; }

/* nav */
.nav { height:42px; display:flex; align-items:center; padding:0 18px; gap:10px; flex-shrink:0; position:relative; z-index:2;
  background:rgba(255,255,255,.75); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,.05); }
.nav-k { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:#111; flex-shrink:0; }
.nav-brand { font-size:11px; font-weight:600; letter-spacing:.1em; color:#111; }
.nav-links { display:flex; gap:14px; margin-left:auto; }
.nav-links span { font-size:9px; color:#aaa; }
.nav-cta { padding:6px 13px; border-radius:20px; font-size:8px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#111; }

/* body */
.body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; padding:16px; position:relative; z-index:2; }
.eye  { font-size:8px; letter-spacing:.45em; text-transform:uppercase; }
.title { font-family:'Cormorant Garamond',serif; font-size:22px; font-style:italic; font-weight:300; text-align:center; line-height:1.15; color:#111; }
.tags { font-size:8px; color:#bbb; letter-spacing:.06em; }
.btns { display:flex; gap:8px; margin-top:4px; }
.btn  { padding:7px 18px; border-radius:20px; font-size:8px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }

/* glass badge */
.badge { position:absolute; bottom:14px; right:14px; border-radius:10px; padding:7px 10px;
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); display:flex; flex-direction:column; gap:2px;
  background:rgba(255,255,255,.65); border:1px solid; }
.badge-line { font-size:7px; color:rgba(0,0,0,.4); }

/* swatches */
.sw-row { background:#fff; padding:11px 15px; display:flex; gap:10px; border-top:1px solid rgba(0,0,0,.05); }
.sw { display:flex; flex-direction:column; align-items:center; gap:3px; }
.dot { width:28px; height:28px; border-radius:7px; }
.hx  { font-size:8px; color:#bbb; font-family:monospace; }
.nl  { font-size:7px; color:#ccc; }

.chosen { text-align:center; color:#999; font-size:12px; margin-top:48px; padding-bottom:48px; }
.chosen b { color:#111; }

/* gradient text utility */
.grad-text { background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
</style>
</head>
<body>
<h1>KUERRE — Dorado Metálico · Aero Blanco</h1>
<p class="sub">6 variaciones de efecto metálico sobre fondo blanco</p>
<div class="grid" id="grid"></div>
<p class="chosen" id="chosen">Ninguna seleccionada</p>

<script>
// Gradientes metálicos — simulan la reflexión de luz en metal
const METALS = [
  {
    num:1, nm:'Oro Clásico', ds:'Cálido, equilibrado',
    grad: 'linear-gradient(135deg, #f5e070 0%, #c89010 25%, #f0d060 45%, #a07000 65%, #e0c040 85%, #c89010 100%)',
    gradH:'linear-gradient(135deg, #ffeaa0 0%, #d4a820 30%, #fff0a0 50%, #b07800 70%, #e8d050 100%)',
    glow: 'rgba(212,168,40,.18)',
    glowRgb:'212,168,40',
    swMain:'#c89010', swLight:'#f5e070', swDark:'#a07000'
  },
  {
    num:2, nm:'Oro Antiguo', ds:'Profundo, lujo máximo',
    grad: 'linear-gradient(135deg, #d4a843 0%, #8b6400 25%, #e0b840 45%, #6a4c00 65%, #c8980a 85%, #7a5800 100%)',
    gradH:'linear-gradient(135deg, #e8c060 0%, #a07800 30%, #f0d070 50%, #7a5800 70%, #d4a030 100%)',
    glow: 'rgba(180,130,20,.2)',
    glowRgb:'180,130,20',
    swMain:'#8b6400', swLight:'#d4a843', swDark:'#6a4c00'
  },
  {
    num:3, nm:'Oro Blanco', ds:'Frío, platino-dorado',
    grad: 'linear-gradient(135deg, #f5f0d0 0%, #c8b870 25%, #fff8e8 45%, #a09050 65%, #e8e0b0 85%, #b8a860 100%)',
    gradH:'linear-gradient(135deg, #fffaee 0%, #d4c880 30%, #ffffff 50%, #b0a060 70%, #ede0c0 100%)',
    glow: 'rgba(200,184,112,.15)',
    glowRgb:'200,184,112',
    swMain:'#c8b870', swLight:'#f5f0d0', swDark:'#a09050'
  },
  {
    num:4, nm:'Champagne', ds:'Delicado, bodas premium',
    grad: 'linear-gradient(135deg, #f0d8b0 0%, #c0a070 25%, #f8ead0 45%, #a08050 65%, #e8d0a0 85%, #b89060 100%)',
    gradH:'linear-gradient(135deg, #faecd0 0%, #d0b080 30%, #fff4e0 50%, #b09060 70%, #f0dab0 100%)',
    glow: 'rgba(192,160,112,.16)',
    glowRgb:'192,160,112',
    swMain:'#c0a070', swLight:'#f0d8b0', swDark:'#a08050'
  },
  {
    num:5, nm:'Bronce', ds:'Potente, industrial elegante',
    grad: 'linear-gradient(135deg, #d4904a 0%, #7a4010 25%, #e8a860 45%, #602800 65%, #c07030 85%, #8a4820 100%)',
    gradH:'linear-gradient(135deg, #e8a860 0%, #9a5820 30%, #f0c080 50%, #7a3800 70%, #d08040 100%)',
    glow: 'rgba(180,110,50,.2)',
    glowRgb:'180,110,50',
    swMain:'#7a4010', swLight:'#d4904a', swDark:'#602800'
  },
  {
    num:6, nm:'Oro Líquido', ds:'Vibrante, moderno, tech',
    grad: 'linear-gradient(135deg, #ffe066 0%, #e8a800 20%, #fff098 40%, #c08000 55%, #ffe866 70%, #d09800 85%, #ffe066 100%)',
    gradH:'linear-gradient(135deg, #fff0a0 0%, #f0b800 25%, #fffff0 45%, #d0a000 65%, #fff0b0 100%)',
    glow: 'rgba(230,180,0,.22)',
    glowRgb:'230,180,0',
    swMain:'#e8a800', swLight:'#ffe066', swDark:'#c08000'
  }
];

const grid = document.getElementById('grid');
const chosen = document.getElementById('chosen');

METALS.forEach(m=>{
  const card = document.createElement('div');
  card.className='card';
  card.onclick=()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
    card.classList.add('sel');
    chosen.innerHTML=`Seleccionaste: <b>${m.num} — ${m.nm}</b>`;
  };

  card.innerHTML=`
    <div class="lbl">
      <div class="num" style="background:${m.grad};color:#000">${m.num}</div>
      <span class="nm">${m.nm}</span>
      <span class="ds">${m.ds}</span>
    </div>

    <div class="mock">

      <!-- glow fondo -->
      <div class="glow" style="background:
        radial-gradient(ellipse 55% 45% at 5% 5%, rgba(${m.glowRgb},.22) 0%, transparent 60%),
        radial-gradient(ellipse 35% 30% at 95% 95%, rgba(${m.glowRgb},.12) 0%, transparent 55%);">
      </div>

      <!-- navbar -->
      <div class="nav">
        <div class="nav-k" style="background:${m.grad};border:1px solid rgba(${m.glowRgb},.3);box-shadow:0 2px 8px rgba(${m.glowRgb},.3)">K</div>
        <span class="nav-brand">KUERRE</span>
        <div class="nav-links"><span>QR</span><span>Premiere</span><span>Invitaciones</span></div>
        <div class="nav-cta" style="background:${m.grad};box-shadow:0 2px 10px rgba(${m.glowRgb},.35)">Contactar</div>
      </div>

      <!-- hero -->
      <div class="body">
        <span class="eye grad-text" style="background-image:${m.grad}">— servicios digitales —</span>
        <div class="title">Experiencias que<br>perduran</div>
        <div class="tags">QR · PREMIERE · INVITACIONES DIGITALES</div>
        <div class="btns">
          <div class="btn" style="background:${m.grad};color:#000;box-shadow:0 4px 16px rgba(${m.glowRgb},.35)">Ver servicios</div>
          <div class="btn" style="border:1px solid rgba(0,0,0,.1);color:#666">Saber más</div>
        </div>
      </div>

      <!-- glass badge -->
      <div class="badge" style="border-color:rgba(${m.glowRgb},.25);box-shadow:0 4px 12px rgba(${m.glowRgb},.15)">
        <div class="badge-line" style="background:${m.grad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700">● En vivo</div>
        <div class="badge-line">QR activo · 128 fotos</div>
      </div>

    </div>

    <!-- swatches -->
    <div class="sw-row">
      <div class="sw">
        <div class="dot" style="background:#fff;border:1px solid #e5e5e5"></div>
        <div class="hx">#ffffff</div><div class="nl">Fondo</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:#111"></div>
        <div class="hx">#111111</div><div class="nl">Negro</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${m.grad}"></div>
        <div class="hx">${m.swMain}</div><div class="nl">Oro base</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${m.swLight}"></div>
        <div class="hx">${m.swLight}</div><div class="nl">Luz</div>
      </div>
      <div class="sw">
        <div class="dot" style="background:${m.swDark}"></div>
        <div class="hx">${m.swDark}</div><div class="nl">Sombra</div>
      </div>
    </div>`;

  grid.appendChild(card);
});
</script>
</body>
</html>
